server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/smartcart_ecommerce
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  cloud:
    config:
      enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

logging:
  level:
    org.springframework.cloud.openfeign: DEBUG
    com.kodewala.cart: DEBUG
